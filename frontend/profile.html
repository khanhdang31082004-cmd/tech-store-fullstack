<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thông Tin Cá Nhân - Tech Store</title>
  <!-- Nhúng TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cyber: {
              900: '#0b0f19',
              850: '#0f1524',
              800: '#161f30',
              750: '#1f2b42',
              500: '#00f0ff',
              400: '#22d3ee',
              neonGreen: '#39ff14',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-cyber-900 text-white sticky top-0 z-40 shadow-lg border-b border-cyber-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
      <div class="flex items-center justify-between h-14">
        <a href="index.html" class="flex items-center gap-2 text-2xl font-black tracking-widest text-white hover:text-cyber-500 transition-colors">
          <span class="bg-gradient-to-r from-cyber-500 to-emerald-400 bg-clip-text text-transparent">TECH STORE</span>
        </a>
        <div class="flex items-center gap-5">
          <a href="cart.html" class="relative p-2.5 bg-cyber-800 hover:bg-cyber-750 border border-cyber-750 text-white rounded-lg hover-scale transition-all">
            <svg class="w-5 h-5 text-cyber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
            </svg>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-rose-500 text-white font-black text-[10px] px-1.5 py-0.5 rounded-full hidden">0</span>
          </a>
          <div id="nav-auth-container" class="text-xs font-semibold"></div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Container chính -->
  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    <a href="index.html" class="inline-flex items-center gap-2 text-xs font-bold text-cyber-500 hover:text-cyan-500 transition-colors mb-6 hover:scale-105">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Quay lại trang chủ
    </a>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Cột trái: Hồ sơ cá nhân (Form chỉnh sửa) -->
      <section class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-fit">
        <h2 class="text-lg font-black text-slate-800 mb-6 pb-3 border-b border-slate-100 flex items-center gap-2 uppercase tracking-wider">
          <svg class="w-5 h-5 text-cyber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          Hồ sơ tài khoản
        </h2>
        
        <!-- Skeleton Loading -->
        <div id="profile-skeleton" class="animate-pulse space-y-4">
          <div class="h-10 bg-slate-200 rounded"></div>
          <div class="h-10 bg-slate-200 rounded"></div>
          <div class="h-10 bg-slate-200 rounded"></div>
          <div class="h-12 bg-slate-200 rounded"></div>
        </div>

        <!-- Form thực tế (ban đầu ẩn, nạp xong sẽ hiển thị) -->
        <form id="form-profile" class="space-y-4 hidden">
          <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Tên đăng nhập (Khóa)</label>
            <input type="text" id="profile-username" disabled class="w-full bg-slate-100 border border-slate-200 rounded-lg px-4 py-2.5 text-xs text-slate-500 cursor-not-allowed">
          </div>
          <div>
            <label for="profile-fullname" class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Họ và tên *</label>
            <input type="text" id="profile-fullname" required class="w-full bg-white border border-slate-350 rounded-lg px-4 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-cyber-500 transition-all text-slate-800">
          </div>
          <div>
            <label for="profile-email" class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Địa chỉ Email *</label>
            <input type="email" id="profile-email" required class="w-full bg-white border border-slate-355 rounded-lg px-4 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-cyber-500 transition-all text-slate-800">
          </div>
          <div>
            <label for="profile-phone" class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Số điện thoại liên lạc</label>
            <input type="tel" id="profile-phone" class="w-full bg-white border border-slate-355 rounded-lg px-4 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-cyber-500 transition-all text-slate-800">
          </div>
          <div>
            <label for="profile-address" class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Địa chỉ giao hàng mặc định</label>
            <textarea id="profile-address" rows="3" class="w-full bg-white border border-slate-355 rounded-lg px-4 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-cyber-500 transition-all text-slate-800" placeholder="Số nhà, tên đường, phường/xã, quận/huyện..."></textarea>
          </div>
          
          <button type="submit" class="w-full py-3.5 rounded-lg bg-cyber-500 hover:bg-cyan-500 text-black font-extrabold text-xs shadow-lg hover-scale glow-cyan transition-all border-0 cursor-pointer focus:outline-none">
            Cập nhật hồ sơ thông tin
          </button>
        </form>
      </section>

      <!-- Cột phải: Lịch sử đơn hàng -->
      <section class="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
        <h2 class="text-lg font-black text-slate-800 mb-6 pb-3 border-b border-slate-100 flex items-center gap-2 uppercase tracking-wider">
          <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
          Lịch sử đặt hàng
        </h2>

        <!-- Danh sách đơn hàng -->
        <div id="orders-list-container" class="space-y-6">
          <!-- Skeleton Loading -->
          <div class="animate-pulse space-y-4">
            <div class="h-20 bg-slate-100 rounded"></div>
            <div class="h-20 bg-slate-100 rounded"></div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-cyber-900 text-white mt-12 border-t border-cyber-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-center text-slate-500 text-[10px] font-bold">
      &copy; 2026 Tech Store. Tất cả bản quyền được bảo lưu.
    </div>
  </footer>

  <script src="app.js?v=2"></script>
  <script src="profile.js?v=2"></script>
</body>
</html>
