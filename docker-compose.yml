version: '3.8'

services:
  # Service Database MySQL 8.0
  mysql:
    image: mysql:8.0
    container_name: tech_store_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_DATABASE: 'tech_store'
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/database.sql:/docker-entrypoint-initdb.d/database.sql
    networks:
      - tech_store_network

  # Service Backend Node.js Express API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tech_store_backend
    restart: always
    depends_on:
      - mysql
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: '123456'
      DB_NAME: tech_store
      JWT_SECRET: tech_store_secret_key
      FRONTEND_URL: 'http://localhost:8080'
    ports:
      - '5000:5000'
    networks:
      - tech_store_network

  # Service Frontend Nginx Web Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tech_store_frontend
    restart: always
    ports:
      - '8080:80'
    networks:
      - tech_store_network

networks:
  tech_store_network:
    driver: bridge

volumes:
  mysql_data:
